# =============================================================================
# Continuous Deployment Pipeline
# =============================================================================
# Environments:
#   - preprod: Pre-production for testing (PR merge to develop)
#   - production: Production environment (PR merge to main)
#
# Triggered on:
#   - PR merged to main → Production deployment
#   - PR merged to develop → Pre-production deployment
#   - Manual workflow_dispatch → Choose environment
#
# Industry Best Practice:
#   Deployments only trigger on PR merges, NOT direct pushes.
#   This ensures all code goes through review before deployment.
#
# Required Secrets (per environment):
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub access token
#   PREPROD_HOST        - Pre-production server hostname/IP
#   PREPROD_USERNAME    - Pre-production SSH username
#   PREPROD_SSH_KEY     - Pre-production SSH private key
#   PROD_HOST           - Production server hostname/IP
#   PROD_USERNAME       - Production SSH username
#   PROD_SSH_KEY        - Production SSH private key
# =============================================================================

name: Deploy

on:
  # Trigger deployment only when PR is merged (not on direct push)
  pull_request:
    types: [closed]
    branches:
      - main      # PR merged to main → Production
      - develop   # PR merged to develop → Pre-production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'preprod'
        type: choice
        options:
          - preprod
          - production
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - scale
      replicas:
        description: 'Number of app replicas (1-20, for scale action)'
        required: false
        default: '3'
        type: string

# Restrict permissions to minimum required
permissions:
  contents: read
  packages: read
  security-events: write

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/shipsaas

jobs:
  # ===========================================================================
  # Determine Target Environment
  # ===========================================================================
  setup:
    runs-on: ubuntu-latest
    # Only run if PR was merged (not just closed) or manual trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      stack_name: ${{ steps.set-env.outputs.stack_name }}
      compose_file: ${{ steps.set-env.outputs.compose_file }}
      data_path: ${{ steps.set-env.outputs.data_path }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          # Determine environment based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR merged - check target branch
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
            if [ "$TARGET_BRANCH" = "main" ]; then
              ENV="production"
            elif [ "$TARGET_BRANCH" = "develop" ]; then
              ENV="preprod"
            else
              echo "Unknown target branch: $TARGET_BRANCH"
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            echo "Unknown event: ${{ github.event_name }}"
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should_deploy=true" >> $GITHUB_OUTPUT

          if [ "$ENV" = "production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "stack_name=saas" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "data_path=/opt/saas/data" >> $GITHUB_OUTPUT
          else
            echo "environment=preprod" >> $GITHUB_OUTPUT
            echo "stack_name=preprod" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.preprod.yml" >> $GITHUB_OUTPUT
            echo "data_path=/opt/preprod/data" >> $GITHUB_OUTPUT
          fi

          echo "Deploying to: $ENV (triggered by ${{ github.event_name }})"

  # ===========================================================================
  # CI Tests - Reuse existing CI workflow
  # ===========================================================================
  test:
    needs: setup
    uses: ./.github/workflows/ci.yml
    if: |
      needs.setup.outputs.should_deploy == 'true' &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))

  # ===========================================================================
  # Build Docker Image and Push to Registry
  # ===========================================================================
  build:
    needs: [setup, test]
    if: |
      needs.setup.outputs.should_deploy == 'true' &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3

      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # master
        with:
          image-ref: '${{ env.DOCKER_IMAGE }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail build on CRITICAL/HIGH vulnerabilities

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@662472033e021d55d94146f66f6058822b0b39fd # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # Deploy to Pre-Production
  # ===========================================================================
  deploy-preprod:
    needs: [setup, build]
    if: |
      needs.setup.outputs.should_deploy == 'true' &&
      needs.setup.outputs.environment == 'preprod' &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    runs-on: ubuntu-latest
    environment: preprod

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Copy stack files and deploy script to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94571 # v0.1.7
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USERNAME }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.preprod.yml,scripts/ci-deploy.sh"
          target: "/opt/preprod"

      - name: Deploy to Pre-Production
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USERNAME }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            cd /opt/preprod
            chmod +x scripts/ci-deploy.sh
            ./scripts/ci-deploy.sh deploy preprod docker-compose.preprod.yml ${{ env.DOCKER_IMAGE }} ${{ github.sha }}

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    needs: [setup, build]
    if: |
      needs.setup.outputs.should_deploy == 'true' &&
      needs.setup.outputs.environment == 'production' &&
      (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Copy stack files and deploy script to server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94571 # v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,scripts/ci-deploy.sh"
          target: "/opt/saas"

      - name: Deploy to Production
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            cd /opt/saas
            chmod +x scripts/ci-deploy.sh
            ./scripts/ci-deploy.sh deploy saas docker-compose.prod.yml ${{ env.DOCKER_IMAGE }} ${{ github.sha }}

  # ===========================================================================
  # Scale (works for both environments)
  # ===========================================================================
  scale:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'scale' }}

    steps:
      - name: Validate replicas input
        run: |
          REPLICAS="${{ inputs.replicas }}"
          if ! [[ "$REPLICAS" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Invalid replicas value"
            exit 1
          fi
          if [ "$REPLICAS" -lt 1 ] || [ "$REPLICAS" -gt 20 ]; then
            echo "ERROR: Replicas must be between 1 and 20"
            exit 1
          fi

      - name: Scale Pre-Production
        if: needs.setup.outputs.environment == 'preprod'
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USERNAME }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          script: |
            cd /opt/preprod
            if [ -f scripts/ci-deploy.sh ]; then
              ./scripts/ci-deploy.sh scale ${{ needs.setup.outputs.stack_name }} ${{ inputs.replicas }}
            else
              docker service scale ${{ needs.setup.outputs.stack_name }}_app=${{ inputs.replicas }}
              sleep 10
              docker service ls --filter "name=${{ needs.setup.outputs.stack_name }}_app"
            fi

      - name: Scale Production
        if: needs.setup.outputs.environment == 'production'
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/saas
            if [ -f scripts/ci-deploy.sh ]; then
              ./scripts/ci-deploy.sh scale ${{ needs.setup.outputs.stack_name }} ${{ inputs.replicas }}
            else
              docker service scale ${{ needs.setup.outputs.stack_name }}_app=${{ inputs.replicas }}
              sleep 10
              docker service ls --filter "name=${{ needs.setup.outputs.stack_name }}_app"
            fi

  # ===========================================================================
  # Rollback (works for both environments)
  # ===========================================================================
  rollback:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'rollback' }}

    steps:
      - name: Rollback Pre-Production
        if: needs.setup.outputs.environment == 'preprod'
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USERNAME }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          envs: DOCKER_IMAGE
          script: |
            cd /opt/preprod
            if [ -f scripts/ci-deploy.sh ]; then
              ./scripts/ci-deploy.sh rollback ${{ needs.setup.outputs.stack_name }} ${{ needs.setup.outputs.compose_file }} "$DOCKER_IMAGE"
            else
              set -e
              [ ! -f .previous_image_tag ] && echo "ERROR: No rollback information" && exit 1
              PREVIOUS_TAG=$(cat .previous_image_tag)
              echo "Rolling back to: $PREVIOUS_TAG"
              export IMAGE_TAG="$PREVIOUS_TAG"
              docker stack deploy -c docker-compose.yml -c ${{ needs.setup.outputs.compose_file }} ${{ needs.setup.outputs.stack_name }} --with-registry-auth
              sleep 15
              curl -f http://localhost:3000/api/health && echo "Rollback successful!"
            fi

      - name: Rollback Production
        if: needs.setup.outputs.environment == 'production'
        uses: appleboy/ssh-action@2ead5e36573ae651b5424da2c7eb09573c5f6c54 # v1
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: DOCKER_IMAGE
          script: |
            cd /opt/saas
            if [ -f scripts/ci-deploy.sh ]; then
              ./scripts/ci-deploy.sh rollback ${{ needs.setup.outputs.stack_name }} ${{ needs.setup.outputs.compose_file }} "$DOCKER_IMAGE"
            else
              set -e
              [ ! -f .previous_image_tag ] && echo "ERROR: No rollback information" && exit 1
              PREVIOUS_TAG=$(cat .previous_image_tag)
              echo "Rolling back to: $PREVIOUS_TAG"
              export IMAGE_TAG="$PREVIOUS_TAG"
              docker stack deploy -c docker-compose.yml -c ${{ needs.setup.outputs.compose_file }} ${{ needs.setup.outputs.stack_name }} --with-registry-auth
              sleep 15
              curl -f http://localhost:3000/api/health && echo "Rollback successful!"
            fi
