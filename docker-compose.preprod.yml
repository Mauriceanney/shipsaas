version: "3.9"

# =============================================================================
# Pre-Production Docker Swarm Stack Configuration
# =============================================================================
# MIRRORS PRODUCTION - Use for testing and validation before deploying to prod
#
# Usage: docker stack deploy -c docker-compose.yml -c docker-compose.preprod.yml preprod
#
# Differences from production:
#   - Stack name: preprod (instead of saas)
#   - Data path: /opt/preprod/data/ (instead of /opt/saas/data/)
#   - Default replicas: 2 (instead of 3, to save resources)
#   - Network: preprod_default
#
# Otherwise IDENTICAL to production for accurate testing
#
# Data Persistence (at /opt/preprod/data/):
#   - postgres/      : Database files (CRITICAL)
#   - redis/         : Cache and session data
#   - uploads/       : User uploaded files
#   - backups/       : Daily database backups
#   - letsencrypt/   : SSL certificates
# =============================================================================

# =============================================================================
# Logging Configuration (prevents disk exhaustion)
# =============================================================================
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # Traefik - Reverse Proxy & Load Balancer
  # ===========================================================================
  traefik:
    image: traefik:v3.0
    logging: *default-logging
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      labels:
        # Dashboard (access at traefik.preprod.yourdomain.com)
        - "traefik.enable=true"
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
        - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
        - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.traefik-dashboard.service=api@internal"
        - "traefik.http.services.traefik-dashboard.loadbalancer.server.port=8080"
        # Dashboard authentication (generate hash: htpasswd -nb admin password)
        - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$apr1$$placeholder}"
        - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
    command:
      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Docker Provider (Swarm Mode)
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=preprod_default"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTPS Redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt SSL
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - default

  # ===========================================================================
  # App - Next.js Application (multiple replicas)
  # ===========================================================================
  app:
    image: ${DOCKER_IMAGE:-shipsaas}:${IMAGE_TAG:-latest}
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: ${APP_REPLICAS:-2}  # Default 2 for preprod (vs 3 for prod)
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.app.entrypoints=websecure"
        - "traefik.http.routers.app.tls.certresolver=letsencrypt"
        - "traefik.http.services.app.loadbalancer.server.port=3000"
        # Sticky sessions (keeps user on same replica)
        - "traefik.http.services.app.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.app.loadbalancer.sticky.cookie.name=preprod_affinity"
        # Health check for load balancer
        - "traefik.http.services.app.loadbalancer.healthcheck.path=/api/health"
        - "traefik.http.services.app.loadbalancer.healthcheck.interval=10s"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 15s
        failure_action: rollback
        monitor: 30s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - UPLOAD_PATH=/app/uploads
    volumes:
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default

  # ===========================================================================
  # PostgreSQL - Database (single instance, pinned to manager)
  # ===========================================================================
  postgres:
    logging: *default-logging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - default

  # ===========================================================================
  # Redis - Cache & Sessions (single instance, pinned to manager)
  # ===========================================================================
  redis:
    logging: *default-logging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - default

  # ===========================================================================
  # Backup - Automated PostgreSQL Backups
  # ===========================================================================
  backup:
    image: prodrigestivill/postgres-backup-local:16
    logging: *default-logging
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-saas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - backup_data:/backups
    networks:
      - default

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    driver: overlay
    attachable: true

# =============================================================================
# Volumes - Persistent Data Storage (at /opt/preprod/data/)
# =============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/preprod/data/postgres

  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/preprod/data/redis

  app_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/preprod/data/uploads

  backup_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/preprod/data/backups

  traefik_letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/preprod/data/letsencrypt
