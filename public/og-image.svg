<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#64748b" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Ship Icon -->
  <g transform="translate(450, 200)">
    <path d="M150 0 L180 40 L120 40 Z" fill="url(#accentGradient)"/>
    <path d="M100 40 L200 40 L180 80 L120 80 Z" fill="#2563eb"/>
    <rect x="110" y="80" width="80" height="10" fill="#1e40af"/>
  </g>

  <!-- Main Text -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
    ShipSaaS
  </text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Build Your SaaS Faster
  </text>

  <!-- Feature Pills -->
  <g transform="translate(400, 510)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
    <text x="45" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">
      Next.js 15
    </text>
  </g>

  <g transform="translate(510, 510)">
    <rect x="0" y="0" width="80" height="32" rx="16" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
    <text x="40" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">
      TypeScript
    </text>
  </g>

  <g transform="translate(610, 510)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
    <text x="45" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#60a5fa" text-anchor="middle">
      Stripe
    </text>
  </g>
</svg>
