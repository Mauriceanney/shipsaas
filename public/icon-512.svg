<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="shipGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)"/>
  <rect width="512" height="512" rx="128" fill="url(#grid)" opacity="0.3"/>

  <!-- Ship Icon -->
  <g transform="translate(256, 140)">
    <path d="M0 0 L60 90 L-60 90 Z" fill="url(#shipGradient)"/>
    <path d="M-90 90 L90 90 L60 180 L-60 180 Z" fill="#2563eb"/>
    <rect x="-75" y="180" width="150" height="20" fill="#1e40af"/>
  </g>

  <!-- Text -->
  <text x="256" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
    ShipSaaS
  </text>

  <!-- Tagline -->
  <text x="256" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Build Your SaaS Faster
  </text>

  <!-- Waves -->
  <path d="M40 430 Q90 420 140 430 T240 430 T340 430 T440 430 T472 430" stroke="#60a5fa" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M40 450 Q90 440 140 450 T240 450 T340 450 T440 450 T472 450" stroke="#3b82f6" stroke-width="4" fill="none" opacity="0.4"/>
  <path d="M40 470 Q90 460 140 470 T240 470 T340 470 T440 470 T472 470" stroke="#1e40af" stroke-width="4" fill="none" opacity="0.3"/>
</svg>
